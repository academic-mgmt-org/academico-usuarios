# Docker
# Build and push an image to Azure Container Registry

trigger:
- main

resources:
- repo: self

variables:
  # Container registry service connection established during pipeline creation
  dockerRegistryServiceConnection: '5cffc302-0a35-4b2b-8ea1-04a9ebd67c07'
  imageRepository: 'academicmgmtorgacademicousuarios'
  containerRegistry: 'acracademicoutn.azurecr.io'
  dockerfilePath: '$(Build.SourcesDirectory)/Dockerfile'
  tag: '$(Build.BuildId)'

  # Agent VM image name
  vmImageName: 'ubuntu-latest'

  # Container name on your personal server
  containerName: 'academico-usuarios'

stages:
- stage: Build
  displayName: Build and push stage
  jobs:
  - job: Build
    displayName: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: Docker@2
      displayName: Build and push an image to container registry
      inputs:
        command: buildAndPush
        repository: $(imageRepository)
        dockerfile: $(dockerfilePath)
        containerRegistry: $(dockerRegistryServiceConnection)
        tags: |
          $(tag)
        addPipelineData: false

- stage: Deploy
  displayName: Deploy to personal server
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployToPersonalServer
    displayName: Deploy Docker container
    environment:
      name: 'servidor-gateway'
      resourceType: virtualMachine
    strategy:
      runOnce:
        deploy:
          steps:
          - task: Docker@2
            displayName: Login to Azure Container Registry
            inputs:
              command: login
              containerRegistry: $(dockerRegistryServiceConnection)

          - script: |
              echo "Creating environment folder and file..."
              mkdir -p /home/azureuser/academico-usuarios
              cat << 'EOF' > /home/azureuser/academico-usuarios/.env
              PORT=3001
              NODE_ENV=production
              USUARIOS_API_KEY=d3b07384d113edec49eaa6238ad5ff00
              DB_HOST=petclinic-dev-pg-20260613.postgres.database.azure.com
              DB_PORT=5432
              DB_DATABASE=academico_dev
              DB_USER=petclinicadmin
              DB_PASSWORD=Vd9_Rx42!Qa7Lm26Zp
              EOF
            displayName: 'Create .env file on personal server'

          - script: |
              echo "Pulling image..."
              docker pull $(containerRegistry)/$(imageRepository):$(tag)

              echo "Stopping old container..."
              docker rm -f $(containerName) academico-usuarios-app || true

              echo "Stopping any container using port 3001..."
              PORT_CONTAINERS=$(docker ps -q --filter "publish=3001" || true)

              if [ -n "$PORT_CONTAINERS" ]; then
                docker rm -f $PORT_CONTAINERS
              fi

              echo "Starting new container..."
              docker run -d \
                --name $(containerName) \
                --restart unless-stopped \
                -p 3001:3001 \
                --env-file /home/azureuser/academico-usuarios/.env \
                -e NODE_ENV=production \
                $(containerRegistry)/$(imageRepository):$(tag)

              echo "Verifying container is running..."
              sleep 5
              if ! docker ps --filter "name=^/$(containerName)$" --filter "status=running" --format '{{.Names}}' | grep -qx "$(containerName)"; then
                echo "Container $(containerName) did not stay running."
                docker ps -a --filter "name=^/$(containerName)$"
                docker logs --tail 200 $(containerName) || true
                exit 1
              fi

              echo "Cleaning up dangling images..."
              docker image prune -f

              echo "Deployment completed."
            displayName: Run container on personal server
